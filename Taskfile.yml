# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  setup:
    desc: Set up repo for local work.
    cmds:
      - mkdir -p local-data
      - uv lock
      - uv sync
    silent: true
  get_data:
    desc: Download the comment archive from GitHub.
    cmds:
      - curl -o local-data/ED-2025-OPE-0944_2026-03-30.json.gz https://github.com/user-attachments/files/26360947/ED-2025-OPE-0944_2026-03-30.json.gz
      - cd local-data
      - gunzip -k ED-2025-OPE-0944_2026-03-30.json.gz
  test:
    desc: Run pytest.
    cmds:
      - uv run pytest
  check:
    desc: Lint, format check, and tests (run before each review).
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .
      - uv run pytest
